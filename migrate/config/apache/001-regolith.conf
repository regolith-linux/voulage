<VirtualHost *:80>
	ServerName archive.regolith-desktop.com
	# ServerAlias aaa.bbb.ccc.ddd

	DocumentRoot /var/www/html

	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined

	# experimental, testing, unstable
	AliasMatch "^/(\w+)-(ubuntu|debian)-(\w+)-(amd64|arm64)/(.*)" "/var/www/html-old/$1-$2-$3-$4/$5"

	# release-xxx
	AliasMatch "^/release-(\w+)-(ubuntu|debian)-(\w+)-(amd64|arm64)/(.*)" "/var/www/html-old/release-$1-$2-$3-$4/$5"
</VirtualHost>
