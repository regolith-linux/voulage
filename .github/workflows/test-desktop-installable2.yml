name: Test Regolith Desktop
run-name: Test ${{ inputs.stage }} Regolith Desktop ${{ inputs.distro }} ${{ inputs.codename }} ${{ inputs.arch }}

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Stages to test"
        type: choice
        options:
          - all
          - experimental
          - unstable
          - testing
          - stable
          - release-3_2
        required: true
        default: "all"
      distro:
        description: "Distro to test (debian, ubuntu)"
        type: choice
        options:
          - ""
          - debian
          - ubuntu
        required: false
        default: ""
      codename:
        description: "Codename to test (e.g. noble, bookworm)"
        type: string
        required: false
        default: ""
      arch:
        description: "Architecture to test (amd64, arm64)"
        type: choice
        options:
          - ""
          - amd64
          - arm64
        required: false
        default: ""
  workflow_call:
    inputs:
      stage:
        description: "Stage to test"
        type: string
        required: true
        default: "all"
      distro:
        description: "Distro to test (debian, ubuntu)"
        type: string
        required: false
        default: ""
      codename:
        description: "Codename to test (e.g. noble, bookworm)"
        type: string
        required: false
        default: ""
      arch:
        description: "Architecture to test (amd64, arm64)"
        type: string
        required: false
        default: ""

env:
  runner-arches: "{\"amd64\": \"X64\", \"arm64\": \"arm64\"}" # "TODO"

jobs:
  matrix-builder:
    runs-on: ubuntu-24.04
    outputs:
      arches: ${{ steps.calc-matrix.outputs.arches }}
      runner-arches: ${{ steps.calc-matrix.outputs.runner-arches }}
    steps:
      - name: Calculate Matrix
        id: calc-matrix
        run: |
          if [ -n "${{ inputs.arch }}" ]; then
            ARCHES=(${{ inputs.arch }})
          else
            ARCHES=(amd64 arm64)
          fi

          RUNNER_ACHES=$(jq -n -c --arg amd64 "X64" --arg arm64 "arm64" '$ARGS.named')

          echo "arches=$(jq -n -c '$ARGS.positional' --args -- "${ARCHES[@]}")" >> $GITHUB_OUTPUT
          echo "runner-arches=$(jq -n -c "$RUNNER_ACHES" '$ARGS.named')" >> $GITHUB_OUTPUT


  echo:
    # runs-on: ubuntu-24.04
    runs-on: [self-hosted, Linux, "${{ fromJSON(needs.matrix-builder.outputs.runner-arches)[matrix.arch] }}", bookworm] 
    needs: matrix-builder
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJson(needs.matrix-builder.outputs.arches) }}
    steps:
      - run: |
          echo ${{ matrix.arch }}
          echo "${{ env.runner-arches }}"
          echo ${{ fromJSON(env.runner-arches) }}
          echo ${{ fromJSON(env.runner-arches)['amd64'] }}
          echo ${{ fromJSON(env.runner-arches)['arm64'] }}
          echo ${{ fromJSON(env.runner-arches)['unknown'] }}
          echo ${{ fromJSON(env.runner-arches)[matrix.arch] }}

