            component: main
          - stage: testing
            suite: testing
            component: main
          - stage: stable
            suite: stable
            component: main
          - stage: release-3_2
            suite: stable
            component: v3.2
    env:
      distro: ubuntu
      codename: noble
    steps:
      - name: Install ${{ matrix.wm }} ${{ matrix.stage }} on ${{ env.distro }} ${{ env.codename }}
        uses: regolith-linux/test-desktop-installable-action/ubuntu/noble@main
        with:
          apt-key-url: http://66.175.213.120/_regolith.key
          apt-repo-line: "deb [arch=${{ matrix.arch }}] http://66.175.213.120/${{ env.distro }}/${{ matrix.suite }} ${{ env.codename }} ${{ matrix.component }}"
          target-package: "regolith-desktop ${{ matrix.wm }}"

  ubuntu-oracular:
    # runs-on: ${{ matrix.host-os }}
    runs-on: [self-hosted, Linux, "${{ matrix.arch }}", oracular] 
    needs: matrix-builder
    if: contains(inputs.distros, 'ubuntu') && contains(inputs.codenames, 'oracular')
    strategy:
      fail-fast: false
      matrix:
        stage: [unstable, testing]
        arch: ${{ fromJson(needs.matrix-builder.outputs.arches) }}
        wm: [regolith-session-flashback, regolith-session-sway]
        include:
          # - arch: amd64
          #   host-os: [self-hosted, Linux, X64, oracular]
          # - arch: arm64
          #   host-os: [self-hosted, Linux, ARM64, oracular]
          - stage: unstable
            suite: unstable
            component: main
          - stage: testing
            suite: testing
            component: main
    env:
      distro: ubuntu
      codename: oracular
    steps:
      - name: Install ${{ matrix.wm }} ${{ matrix.stage }} on ${{ env.distro }} ${{ env.codename }}
        uses: regolith-linux/test-desktop-installable-action/ubuntu/oracular@main
        with:
          apt-key-url: http://66.175.213.120/_regolith.key
          apt-repo-line: "deb [arch=${{ matrix.arch }}] http://66.175.213.120/${{ env.distro }}/${{ matrix.suite }} ${{ env.codename }} ${{ matrix.component }}"
          target-package: "regolith-desktop ${{ matrix.wm }}"
